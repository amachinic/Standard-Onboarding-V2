<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
  <title>Maison · Standard Onboarding Prototype</title>
  <style>
    :root {
      color-scheme: light;
      background: #f1f1ef;
      color: #1b1b19;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f1ef;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      padding: 0;
    }
    .frame {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: var(--appH, 100vh);
      height: 100dvh;
      max-width: none;
      max-height: none;
      border: none;
      background: #fafaf9;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fafaf9;
    }
  </style>
  <script>
    // iOS Safari: 100vh includes the space behind the collapsible URL bar. Size the frame to the
    // DYNAMIC viewport instead - dvh where supported, live innerHeight as the fallback.
    (function(){
      function fit(){ document.documentElement.style.setProperty('--appH', window.innerHeight + 'px'); }
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      fit();
    })();
  </script>
</head>
<body>
  <div class="frame">
    <iframe src="./flow-refined.html?v=20260718b#bare&short" title="Maison onboarding prototype"></iframe>
  </div>
</body>
</html>
